services:
  loki:
    container_name: loki
    hostname: loki
    image: grafana/loki:3.6.7
    ports:
      - 3100:3100

  grafana:
    container_name: grafana
    hostname: grafana
    image: grafana/grafana:12.4.0
    ports:
      - 3000:3000
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
