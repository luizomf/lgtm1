services:
  api:
    hostname: api
    build:
      context: ../api
    depends_on:
      - alloy
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_SERVICE_NAME=lgtm-demo-api
    ports:
      - 8000:8000
    restart: unless-stopped

  loki:
    hostname: loki
    image: grafana/loki:3.6.7
    ports:
      - 3100:3100

  grafana:
    hostname: grafana
    image: grafana/grafana:12.4.0
    ports:
      - 3000:3000
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/datasources/default.yaml:/etc/grafana/provisioning/datasources/default.yaml:ro

  tempo:
    hostname: tempo
    image: grafana/tempo:2.10.1
    ports:
      - 3200:3200
    command: ['-config.file=/etc/tempo/config.yaml']
    volumes:
      - ./tempo-config.yaml:/etc/tempo/config.yaml:ro

  mimir:
    container_name: mimir
    hostname: mimir
    image: grafana/mimir:2.17.7
    ports:
      - 9009:9009
    command: ['-config.file=/etc/mimir/config.yaml', '-target=all']
    volumes:
      - ./mimir-config.yaml:/etc/mimir/config.yaml:ro

  alloy:
    container_name: alloy
    hostname: alloy
    image: grafana/alloy:v1.12.0
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    ports:
      - 12345:12345
      - 4317:4317
      - 4318:4318
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
