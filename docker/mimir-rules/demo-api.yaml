name: demo-api
interval: 30s
rules:
  - alert: DemoApiHighErrorRatio
    expr: 100 * sum(rate(demo_api_requests_total{demo_scenario_status="error"}[5m])) / clamp_min(sum(rate(demo_api_requests_total[5m])), 0.0001) > 10
    for: 30s
    labels:
      severity: warning
      stack: lgtm-demo
    annotations:
      summary: Demo API error ratio is high
      description: Error ratio has been above 10% for at least 30 seconds.
